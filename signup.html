<!doctype html>
<html lang="en" class="bg-gray-50 text-gray-900">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - Rabika</title>
    <link rel="icon" href="images/logo.jpeg" type="image/jpeg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="script.js" defer></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Berkshire+Swash&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main
      class="flex min-h-screen items-center justify-center bg-gradient-to-br from-pink-50 via-rose-100 to-fuchsia-100 px-6 py-12"
    >
      <section class="w-full max-w-2xl rounded-lg bg-white/85 p-8 shadow-2xl">
        <a
          href="index.html"
          class="mb-8 flex items-center justify-center gap-3"
        >
         
          <img
            src="images/rabika.png"
            alt="Rabika Logo"
            class="h-12 w-auto object-contain transition-transform duration-300 hover:scale-105"
          />
        </a>

        <div class="text-center">
          <h1 class="text-3xl font-bold text-gray-900">Create Account</h1>
          <p class="mt-2 text-gray-600">
            Save your address, orders, cart, ratings, and reviews.
          </p>
        </div>

        <form id="signupForm" class="mt-8 grid gap-5 sm:grid-cols-2">
          <input
            id="signupName"
            required
            class="rounded-lg border border-pink-100 px-4 py-3 focus:border-pink-500 focus:outline-none"
            placeholder="Full name"
          />
          <input
            id="signupEmail"
            type="email"
            required
            class="rounded-lg border border-pink-100 px-4 py-3 focus:border-pink-500 focus:outline-none"
            placeholder="Email"
          />
          <input
            id="signupPhone"
            type="tel"
            required
            class="rounded-lg border border-pink-100 px-4 py-3 focus:border-pink-500 focus:outline-none"
            placeholder="Phone number"
          />
          <div class="relative">
            <input
              id="signupPassword"
              type="password"
              required
              minlength="6"
              class="w-full rounded-lg border border-pink-100 px-4 py-3 pr-16 focus:border-pink-500 focus:outline-none"
              placeholder="Password"
            />
            <button
              type="button"
              data-toggle-password="signupPassword"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-sm font-semibold text-pink-600"
            >
              Show
            </button>
          </div>
          <input
            id="signupAddress"
            required
            class="rounded-lg border border-pink-100 px-4 py-3 focus:border-pink-500 focus:outline-none sm:col-span-2"
            placeholder="Full delivery address"
          />
          <input
            id="signupCity"
            required
            class="rounded-lg border border-pink-100 px-4 py-3 focus:border-pink-500 focus:outline-none"
            placeholder="City"
          />
          <input
            id="signupPincode"
            required
            class="rounded-lg border border-pink-100 px-4 py-3 focus:border-pink-500 focus:outline-none"
            placeholder="Pincode"
          />
          <button
            type="submit"
            class="rounded-lg bg-pink-600 py-3 font-semibold text-white shadow-lg hover:bg-pink-700 sm:col-span-2"
          >
            Create Account
          </button>
        </form>

        <p class="mt-6 text-center text-gray-600">
          Already have an account?
          <a href="login.html" class="font-semibold text-pink-600">Login</a>
        </p>
      </section>
    </main>
  </body>
</html>
