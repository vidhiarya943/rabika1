<!doctype html>
<html lang="en" class="bg-gray-50 text-gray-900">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Rabika</title>
    <link rel="icon" href="images/logo.jpeg" type="image/jpeg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="script.js" defer></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Berkshire+Swash&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main
      class="flex min-h-screen items-center justify-center bg-gradient-to-br from-pink-50 via-rose-100 to-fuchsia-100 px-6 py-12"
    >
      <section class="w-full max-w-md rounded-lg bg-white/85 p-8 shadow-2xl">
        <a
          href="index.html"
          class="mb-8 flex items-center justify-center gap-3"
        >
         
          <img
            src="images/rabika.png"
            alt="Rabika Logo"
            class="h-12 w-auto object-contain transition-transform duration-300 hover:scale-105"
          />
        </a>

        <div class="text-center">
          <h1 class="text-3xl font-bold text-gray-900">Welcome Back</h1>
          <p class="mt-2 text-gray-600">
            Login to order, review, and manage your Rabika details.
          </p>
        </div>

        <form id="loginForm" class="mt-8 space-y-5">
          <input
            id="loginEmail"
            type="email"
            required
            class="w-full rounded-lg border border-pink-100 px-4 py-3 focus:border-pink-500 focus:outline-none"
            placeholder="Email"
          />
          <div class="relative">
            <input
              id="loginPassword"
              type="password"
              required
              class="w-full rounded-lg border border-pink-100 px-4 py-3 pr-16 focus:border-pink-500 focus:outline-none"
              placeholder="Password"
            />
            <button
              type="button"
              data-toggle-password="loginPassword"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-sm font-semibold text-pink-600"
            >
              Show
            </button>
          </div>
          <button
            type="submit"
            class="w-full rounded-lg bg-pink-600 py-3 font-semibold text-white shadow-lg hover:bg-pink-700"
          >
            Login
          </button>
        </form>

        <p class="mt-6 text-center text-gray-600">
          Don’t have an account?
          <a href="signup.html" class="font-semibold text-pink-600">
            Sign up
          </a>
        </p>
      </section>
    </main>
  </body>
</html>
